<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard - CrudZaso')}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>My Databases</h3>
            <a href="/databases/create" class="btn btn-primary">+ New Database</a>
        </div>
        <div th:if="${#lists.isEmpty(databases)}" class="text-center py-5">
            <p class="lead text-muted">No databases yet. Create your first one!</p>
        </div>
        <div class="row" th:unless="${#lists.isEmpty(databases)}">
            <div class="col-md-4 mb-3" th:each="db : ${databases}">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start">
                            <h5 class="card-title" th:text="${db.name}">DB Name</h5>
                            <span class="badge" th:classappend="
                                ${db.status.name() == 'RUNNING' ? 'bg-success' :
                                db.status.name() == 'STOPPED' ? 'bg-warning text-dark' :
                                db.status.name() == 'ARCHIVED' ? 'bg-secondary' : 'bg-info'}"
                                th:text="${db.status.name()}">Status</span>
                        </div>
                        <p class="card-text text-muted small" th:text="${db.description}">Description</p>
                        <p class="card-text small">
                            <span class="badge bg-light text-dark me-1" th:text="${db.engine.name()}">Engine</span>
                            <span class="text-muted">Port: <strong th:text="${db.port}">5432</strong></span>
                        </p>
                    </div>
                    <div class="card-footer bg-transparent d-flex justify-content-between">
                        <a th:href="@{'/databases/' + ${db.id}}" class="btn btn-sm btn-outline-primary">Detail</a>
                        <form th:action="@{'/databases/' + ${db.id} + '/delete'}" method="post" style="display:inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                onclick="return confirm('Delete this database?')">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
