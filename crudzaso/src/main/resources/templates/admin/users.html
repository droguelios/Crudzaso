<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Manage Users - CrudZaso')}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="container">
        <h3 class="mb-4">Manage Users</h3>
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${users}">
                                <td th:text="${u.id}">1</td>
                                <td th:text="${u.name} + ' ' + ${u.lastName}">Name</td>
                                <td th:text="${u.email}">email@test.com</td>
                                <td><span class="badge bg-info" th:text="${u.rol.name()}">USER</span></td>
                                <td>
                                    <span class="badge" th:classappend="${u.status == 'ACTIVE' ? 'bg-success' : 'bg-danger'}"
                                        th:text="${u.status}">ACTIVE</span>
                                </td>
                                <td>
                                    <form th:action="@{'/admin/users/' + ${u.id} + '/block'}" method="post" style="display:inline"
                                        th:if="${u.status == 'ACTIVE'}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-danger">Block</button>
                                    </form>
                                    <form th:action="@{'/admin/users/' + ${u.id} + '/unblock'}" method="post" style="display:inline"
                                        th:if="${u.status == 'BLOCKED'}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button class="btn btn-sm btn-success">Unblock</button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
