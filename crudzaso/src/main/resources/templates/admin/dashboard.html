<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin Dashboard - CrudZaso')}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container">
        <h3 class="mb-4">Admin Dashboard</h3>
        <div class="row">
            <div class="col-md-3 mb-3">
                <div class="card bg-primary text-white shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Total Users</h5>
                        <h2 th:text="${totalUsers}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-success text-white shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Active Users</h5>
                        <h2 th:text="${activeUsers}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-danger text-white shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Blocked Users</h5>
                        <h2 th:text="${blockedUsers}">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-info text-white shadow-sm">
                    <div class="card-body text-center">
                        <h5 class="card-title">Total Databases</h5>
                        <h2 th:text="${totalDatabases}">0</h2>
                    </div>
                </div>
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm">
                    <div class="card-header"><h5 class="mb-0">Quick Actions</h5></div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <a href="/admin/users" class="btn btn-outline-primary">Manage Users</a>
                            <a href="/admin/databases" class="btn btn-outline-primary">Manage Databases</a>
                            <a href="/admin/stats" class="btn btn-outline-primary">View Statistics</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm">
                    <div class="card-header"><h5 class="mb-0">Databases by Engine</h5></div>
                    <div class="card-body">
                        <ul class="list-group list-group-flush" th:each="entry : ${databasesByEngine}">
                            <li class="list-group-item d-flex justify-content-between">
                                <span th:text="${entry.key}">Engine</span>
                                <span class="badge bg-primary rounded-pill" th:text="${entry.value}">0</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
