<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Database Detail - CrudZaso')}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" th:text="${db.name}">Database Name</h5>
                        <span class="badge fs-6" th:classappend="
                            ${db.status.name() == 'RUNNING' ? 'bg-success' :
                            db.status.name() == 'STOPPED' ? 'bg-warning text-dark' :
                            db.status.name() == 'ARCHIVED' ? 'bg-secondary' : 'bg-info'}"
                            th:text="${db.status.name()}">Status</span>
                    </div>
                    <div class="card-body">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <p class="mb-1"><strong>Description:</strong></p>
                                <p th:text="${db.description}" class="text-muted">Description here</p>
                            </div>
                            <div class="col-md-6">
                                <p class="mb-1"><strong>Engine:</strong> <span th:text="${db.engine.name()}">PostgreSQL</span></p>
                                <p class="mb-1"><strong>Port:</strong> <span th:text="${db.port}">5432</span></p>
                                <p class="mb-1"><strong>Connection User:</strong> <span th:text="${db.userconection}">user</span></p>
                                <p class="mb-1"><strong>Connection Password:</strong> <span th:text="${db.passwordconection}">pass</span></p>
                            </div>
                        </div>
                        <p class="small text-muted mb-0">
                            Created: <span th:text="${#temporals.format(db.creationDate, 'dd/MM/yyyy HH:mm')}">date</span> |
                            Updated: <span th:text="${#temporals.format(db.updateDate, 'dd/MM/yyyy HH:mm')}">date</span>
                        </p>
                    </div>
                    <div class="card-footer bg-transparent">
                        <div class="d-flex gap-2">
                            <a th:href="@{'/databases/' + ${db.id} + '/edit'}" class="btn btn-primary"
                                th:if="${db.status.name() != 'ARCHIVED'}">Edit</a>
                            <form th:action="@{'/databases/' + ${db.id} + '/status'}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="action" value="START">
                                <button type="submit" class="btn btn-success"
                                    th:if="${db.status.name() == 'STOPPED' || db.status.name() == 'CREATED'}">Start</button>
                            </form>
                            <form th:action="@{'/databases/' + ${db.id} + '/status'}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="action" value="STOP">
                                <button type="submit" class="btn btn-warning"
                                    th:if="${db.status.name() == 'RUNNING'}">Stop</button>
                            </form>
                            <form th:action="@{'/databases/' + ${db.id} + '/status'}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <input type="hidden" name="action" value="ARCHIVE">
                                <button type="submit" class="btn btn-secondary"
                                    th:if="${db.status.name() != 'ARCHIVED'}"
                                    onclick="return confirm('Archive this database? This cannot be undone.')">Archive</button>
                            </form>
                            <form th:action="@{'/databases/' + ${db.id} + '/delete'}" method="post" style="display:inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('Delete this database permanently?')">Delete</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
