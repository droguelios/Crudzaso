<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Profile - CrudZaso')}">
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div th:replace="~{fragments/layout :: alert}"></div>
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-header"><h5 class="mb-0">Profile</h5></div>
                    <div class="card-body">
                        <form th:action="@{/profile/update}" th:object="${profileRequest}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" th:field="*{name}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" th:field="*{lastName}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" class="form-control" th:value="${user.email}" disabled>
                            </div>
                            <button type="submit" class="btn btn-primary">Update Profile</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-header"><h5 class="mb-0">Change Password</h5></div>
                    <div class="card-body">
                        <form th:action="@{/profile/change-password}" th:object="${passwordRequest}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <div class="mb-3">
                                <label class="form-label">Current Password</label>
                                <input type="password" th:field="*{oldPassword}" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Password</label>
                                <input type="password" th:field="*{newPassword}" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-warning">Change Password</button>
                        </form>
                    </div>
                </div>
                <div class="card shadow-sm">
                    <div class="card-body">
                        <p class="mb-1"><strong>Role:</strong> <span class="badge bg-info" th:text="${user.rol.name()}">USER</span></p>
                        <p class="mb-1"><strong>Status:</strong> <span class="badge" th:classappend="${user.status == 'ACTIVE' ? 'bg-success' : 'bg-danger'}" th:text="${user.status}">ACTIVE</span></p>
                        <p class="mb-0"><strong>Member since:</strong> <span th:text="${#temporals.format(user.registrationDate, 'dd/MM/yyyy')}">date</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
